<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mo360 · 360° Virtual Tours & Immersive Media · Plymouth</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0e0e0e;
      --cream: #f5f0e8;
      --gold: #c9a84c;
      --muted: #5a5347;
      --card-bg: #ffffff;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .profile {
      text-align: center;
      padding: 2rem 0 1.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 1rem;
      border: 3px solid var(--gold);
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--ink);
    }

    .subtitle {
      font-size: 0.72rem;
      color: var(--gold);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 0.4rem;
      line-height: 1.6;
      font-weight: 500;
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 0.3rem;
      line-height: 1.6;
    }

    .location {
      font-size: 0.72rem;
      color: var(--gold);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 1.5rem 0;
      animation: fadeUp 0.6s 0.1s ease both;
      opacity: 0;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--card-bg);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      padding: 0.85rem 1.1rem;
      text-decoration: none;
      color: var(--ink);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      animation: fadeUp 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gold);
      border-radius: 12px 0 0 12px;
      transform: scaleY(0);
      transition: transform 0.2s ease;
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      border-color: var(--gold);
    }

    .link-card:hover::before { transform: scaleY(1); }

    .link-icon {
      font-size: 1.3rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      border-radius: 8px;
      flex-shrink: 0;
    }

    .link-text { flex: 1; }

    .link-title {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.2;
    }

    .link-sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .link-arrow {
      color: var(--muted);
      font-size: 0.9rem;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .link-card:hover .link-arrow {
      opacity: 1;
      color: var(--gold);
    }

    .section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin: 1.5rem 0 0.5rem;
      animation: fadeUp 0.5s ease both;
    }

    .link-card:nth-child(1) { animation-delay: 0.15s; opacity: 0; }
    .link-card:nth-child(2) { animation-delay: 0.22s; opacity: 0; }
    .link-card:nth-child(3) { animation-delay: 0.29s; opacity: 0; }
    .link-card:nth-child(4) { animation-delay: 0.36s; opacity: 0; }
    .link-card:nth-child(5) { animation-delay: 0.43s; opacity: 0; }
    .link-card:nth-child(6) { animation-delay: 0.50s; opacity: 0; }
    .link-card:nth-child(7) { animation-delay: 0.57s; opacity: 0; }

    .profile { opacity: 0; }
    .divider { opacity: 0; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.5s 0.8s ease both;
    }
  </style>
</head>
